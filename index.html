<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>timetable.design · v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e; --bg-card: #16213e; --bg-card-h: #1a2a42;
      --ink: #cdd6f4; --ink-soft: #7f849c; --ink-dim: #313244;
      --accent: #89b4fa; --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
      --mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      background-image: linear-gradient(135deg,#0f0f1a 0%,#0d1b2a 30%,#1a0a2e 60%,#0a1f0f 100%);
      background-attachment: fixed;
      font-family: var(--mono);
      color: var(--ink);
      font-size: 13px;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }
    a { color: inherit; text-decoration: none; }

    /* nav */
    .tt-nav {
      border-bottom: 1px solid var(--ink-dim);
      background: rgba(15,15,26,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .tt-brand { font-size: 13px; color: var(--ink); }
    .tt-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tt-btn {
      background: transparent;
      border: 1px solid var(--ink-dim);
      color: var(--ink-soft);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 11px;
      border-radius: 3px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tt-btn:hover { color: var(--ink); border-color: var(--accent); }
    .tt-btn.accent { border-color: var(--accent); color: var(--accent); }
    .tt-btn.success { border-color: var(--green); color: var(--green); }
    .tt-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .tt-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* layout */
    .tt-body { display: flex; min-height: calc(100vh - 49px); }

    /* sidebar */
    .tt-sidebar {
      width: 216px;
      min-width: 216px;
      border-right: 1px solid var(--ink-dim);
      padding: 18px 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 7px;
    }
    .subject-list { display: flex; flex-direction: column; gap: 5px; }
    .subject-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 9px;
      border: 1px solid var(--ink-dim);
      border-radius: 3px;
      cursor: grab;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .subject-item:hover { border-color: var(--accent); background: var(--bg-card); }
    .subject-item.dragging { opacity: 0.35; }
    .subject-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .subject-name { font-size: 11px; color: var(--ink-soft); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .subject-del { color: var(--ink-dim); cursor: pointer; font-size: 14px; line-height: 1; transition: color .15s; flex-shrink: 0; }
    .subject-del:hover { color: var(--red); }

    .add-row { display: flex; gap: 5px; align-items: center; }
    .add-row input {
      flex: 1; min-width: 0;
      background: var(--bg-card);
      border: 1px solid var(--ink-dim);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 7px;
      border-radius: 3px;
      outline: none;
      transition: border-color .15s;
    }
    .add-row input:focus { border-color: var(--accent); }
    .add-row input::placeholder { color: var(--ink-dim); }
    .add-row button {
      background: transparent;
      border: 1px solid var(--ink-dim);
      color: var(--ink-soft);
      font-family: var(--mono);
      font-size: 16px;
      width: 27px; height: 27px;
      border-radius: 3px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .add-row button:hover { color: var(--green); border-color: var(--green); }

    .config-row { display: flex; align-items: center; gap: 8px; }
    .config-row label { font-size: 10px; color: var(--ink-dim); flex-shrink: 0; }
    .config-row input[type=number] {
      background: var(--bg-card);
      border: 1px solid var(--ink-dim);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 3px;
      outline: none;
      width: 50px;
      transition: border-color .15s;
    }
    .config-row input[type=number]:focus { border-color: var(--accent); }

    .day-toggle-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .day-toggle {
      font-size: 10px;
      padding: 3px 8px;
      border: 1px solid var(--ink-dim);
      border-radius: 3px;
      cursor: pointer;
      color: var(--ink-dim);
      transition: all .15s;
      user-select: none;
    }
    .day-toggle.on { border-color: var(--accent); color: var(--accent); }

    .preset-list { display: flex; flex-direction: column; gap: 5px; }
    .preset-item { display: flex; align-items: center; gap: 5px; }
    .preset-item button { flex: 1; text-align: left; font-size: 11px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preset-del { font-size: 12px; color: var(--ink-dim); cursor: pointer; padding: 3px 6px; border-radius: 3px; transition: color .15s; }
    .preset-del:hover { color: var(--red); }

    .save-row { display: flex; gap: 5px; }
    .save-row input {
      flex: 1; min-width: 0;
      background: var(--bg-card);
      border: 1px solid var(--ink-dim);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 7px;
      border-radius: 3px;
      outline: none;
      transition: border-color .15s;
    }
    .save-row input:focus { border-color: var(--accent); }
    .save-row input::placeholder { color: var(--ink-dim); }

    .sep { height: 1px; background: var(--ink-dim); margin: 2px 0; }
    .hint { font-size: 10px; color: var(--ink-dim); line-height: 1.7; }
    .save-status { font-size: 10px; color: var(--ink-dim); margin-top: 4px; min-height: 14px; transition: color .15s; }
    .save-status.ok { color: var(--green); }
    .save-status.err { color: var(--red); }

    /* grid */
    .tt-main { flex: 1; overflow: auto; }
    .tt-grid { display: grid; border-left: 1px solid var(--ink-dim); min-width: max-content; }
    .tt-head-cell {
      padding: 11px 6px;
      text-align: center;
      font-size: 10px;
      color: var(--ink-soft);
      border-right: 1px solid var(--ink-dim);
      border-bottom: 1px solid var(--ink-dim);
      letter-spacing: .05em;
    }
    .tt-head-cell.corner { color: var(--ink-dim); }
    .time-label {
      padding: 0 9px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 10px;
      color: var(--ink-dim);
      border-right: 1px solid var(--ink-dim);
      border-bottom: 1px solid var(--ink-dim);
      min-height: 54px;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .tt-cell {
      border-right: 1px solid var(--ink-dim);
      border-bottom: 1px solid var(--ink-dim);
      min-height: 54px;
      padding: 3px;
      position: relative;
      transition: background .15s;
      min-width: 96px;
    }
    .tt-cell.drag-over { background: rgba(137,180,250,0.08); border-color: var(--accent); }
    .cell-block {
      width: 100%; height: 100%;
      min-height: 46px;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 5px 7px;
      font-size: 10px;
      cursor: pointer;
      position: relative;
      transition: filter .15s;
    }
    .cell-block:hover { filter: brightness(1.2); }
    .cell-block-name { line-height: 1.3; }
    .cell-del {
      position: absolute;
      top: 2px; right: 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      line-height: 1;
      transition: color .15s;
    }
    .cell-del:hover { color: rgba(255,255,255,0.9); }

    /* modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,10,20,0.97);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      padding-top: 56px;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      max-width: 520px;
      width: 90%;
      background: var(--bg-card);
      border: 1px solid var(--ink-dim);
      border-radius: 4px;
      padding: 30px 34px;
      transform: translateY(12px);
      transition: transform .25s ease;
    }
    .modal-backdrop.open .modal { transform: none; }
    .modal-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-topbar h3 { font-size: 13px; font-weight: 400; color: var(--ink); }
    .export-pre {
      background: var(--bg);
      border: 1px solid var(--ink-dim);
      border-radius: 3px;
      padding: 14px;
      font-size: 10px;
      color: var(--ink-soft);
      white-space: pre;
      overflow-x: auto;
      line-height: 1.7;
      margin-bottom: 14px;
      max-height: 340px;
      overflow-y: auto;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--ink-dim); border-radius: 2px; }

    kbd {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      border: 1px solid #3d5a6e;
      border-radius: 3px;
      padding: 1px 5px;
      line-height: 1.6;
      background: rgba(137,180,250,0.06);
    }

    footer {
      margin-top: 60px;
      padding: 20px 24px;
      border-top: 1px solid var(--ink-dim);
      font-size: 11px;
      color: var(--ink-dim);
    }
  </style>
</head>
<body>

  <nav class="tt-nav">
    <span class="tt-brand">timetable.design · <span id="nav-version" style="color:var(--ink-soft);font-size:11px;">unsaved</span></span>
    <div class="tt-actions">
      <button class="tt-btn danger" id="btn-clear">clear</button>
      <button class="tt-btn" id="btn-export">export</button>
    </div>
  </nav>

  <div class="tt-body">
    <div class="tt-sidebar">

      <div>
        <div class="sidebar-label">subjects</div>
        <div class="subject-list" id="subject-list"></div>
        <div style="margin-top:7px;" class="add-row">
          <input type="text" id="new-subject" placeholder="add subject" maxlength="18" />
          <button id="btn-add-subject">+</button>
        </div>
      </div>

      <div class="sep"></div>

      <div>
        <div class="sidebar-label">days</div>
        <div class="day-toggle-row" id="day-toggles"></div>
        <div style="margin-top:7px;" class="add-row">
          <input type="text" id="new-day" placeholder="add day" maxlength="10" />
          <button id="btn-add-day">+</button>
        </div>
      </div>

      <div class="sep"></div>

      <div>
        <div class="sidebar-label">periods</div>
        <div class="config-row">
          <label>start</label>
          <input type="number" id="period-start" value="8" min="0" max="23" />
          <label>:00</label>
        </div>
        <div class="config-row" style="margin-top:6px;">
          <label>count</label>
          <input type="number" id="period-count" value="9" min="1" max="16" />
        </div>
        <div class="config-row" style="margin-top:6px;">
          <label>dur (min)</label>
          <input type="number" id="period-dur" value="60" min="15" max="180" step="15" />
        </div>
        <button class="tt-btn" style="margin-top:8px;width:100%;" id="btn-apply-periods">apply</button>
      </div>

      <div class="sep"></div>

      <div>
        <div class="sidebar-label">saved timetables</div>
        <div class="preset-list" id="preset-list"></div>
        <div style="margin-top:7px;" class="save-row">
          <input type="text" id="preset-name" placeholder="save as..." maxlength="24" />
          <button class="tt-btn success" id="btn-save-preset">save</button>
        </div>
        <div class="save-status" id="save-status"></div>
      </div>

      <div style="margin-top:auto;" class="hint">
        drag subjects onto the grid.<br>
        click × on a block to remove.<br>
        long-press a day tag to delete it.<br>
        everything saves to localStorage.
      </div>

    </div>

    <div class="tt-main">
      <div class="tt-grid" id="tt-grid"></div>
    </div>
  </div>

  <footer>© 2026 · timetable.design · localStorage edition</footer>

  <div class="modal-backdrop" id="export-modal">
    <div class="modal">
      <div class="modal-topbar">
        <h3>timetable export</h3>
        <span style="display:flex;gap:8px;">
          <button class="tt-btn accent" id="btn-copy">copy</button>
          <button class="tt-btn" id="btn-close-export"><kbd>esc</kbd> close</button>
        </span>
      </div>
      <div class="export-pre" id="export-content"></div>
    </div>
  </div>

<script>
  const COLORS = ['#89b4fa','#a6e3a1','#cba6f7','#fab387','#f38ba8','#94e2d5','#f9e2af','#89dceb','#b4befe','#eba0ac'];
  const LS_STATE = 'tt_state';
  const LS_PRESETS = 'tt_presets';

  let dragSubject = null;
  let colorIdx = 0;

  function lsGet(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
  }
  function lsSet(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }

  function defaultState() {
    return {
      name: 'untitled',
      subjects: [
        {name:'biology',color:'#a6e3a1'},{name:'physics',color:'#89b4fa'},
        {name:'chemistry',color:'#fab387'},{name:'maths',color:'#cba6f7'},
        {name:'english',color:'#89dceb'},
      ],
      days: ['mon','tue','wed','thu','fri'],
      activeDays: ['mon','tue','wed','thu','fri'],
      periodStart: 8, periodCount: 9, periodDur: 60,
      grid: {}
    };
  }

  let state = lsGet(LS_STATE) || defaultState();
  let presets = lsGet(LS_PRESETS) || [];
  colorIdx = state.subjects.length;

  function autoSave() {
    lsSet(LS_STATE, state);
    document.getElementById('nav-version').textContent = state.name;
  }

  function setSaveStatus(msg, type, clear) {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status' + (type ? ' ' + type : '');
    if (clear) setTimeout(() => { el.textContent = ''; el.className = 'save-status'; }, 2200);
  }

  function getSlots() {
    const slots = [];
    let h = state.periodStart, m = 0;
    for (let i = 0; i < state.periodCount; i++) {
      const hh = h % 24;
      slots.push(`${hh}:${m === 0 ? '00' : String(m).padStart(2,'0')}`);
      m += state.periodDur;
      h += Math.floor(m / 60);
      m = m % 60;
    }
    return slots;
  }

  function activeDaysOrdered() {
    return state.days.filter(d => state.activeDays.includes(d));
  }

  function renderSubjects() {
    const list = document.getElementById('subject-list');
    list.innerHTML = '';
    state.subjects.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'subject-item';
      el.draggable = true;
      el.innerHTML = `<div class="subject-dot" style="background:${s.color}"></div><span class="subject-name">${s.name}</span><span class="subject-del">×</span>`;
      el.addEventListener('dragstart', () => { dragSubject = s; setTimeout(() => el.classList.add('dragging'), 0); });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
      el.querySelector('.subject-del').addEventListener('click', () => {
        const name = state.subjects[i].name;
        state.subjects.splice(i, 1);
        for (const k in state.grid) { if (state.grid[k] && state.grid[k].name === name) delete state.grid[k]; }
        autoSave(); renderSubjects(); renderGrid();
      });
      list.appendChild(el);
    });
  }

  function renderDayToggles() {
    const row = document.getElementById('day-toggles');
    row.innerHTML = '';
    state.days.forEach(d => {
      const el = document.createElement('div');
      el.className = 'day-toggle' + (state.activeDays.includes(d) ? ' on' : '');
      el.textContent = d;
      el.title = 'click to toggle · long-press to delete';
      let pressTimer;
      el.addEventListener('mousedown', () => {
        pressTimer = setTimeout(() => {
          state.days = state.days.filter(x => x !== d);
          state.activeDays = state.activeDays.filter(x => x !== d);
          autoSave(); renderDayToggles(); renderGrid();
        }, 600);
      });
      el.addEventListener('mouseup', () => clearTimeout(pressTimer));
      el.addEventListener('mouseleave', () => clearTimeout(pressTimer));
      el.addEventListener('click', () => {
        if (state.activeDays.includes(d)) {
          if (state.activeDays.length > 1) state.activeDays = state.activeDays.filter(x => x !== d);
        } else {
          state.activeDays.push(d);
          state.activeDays.sort((a,b) => state.days.indexOf(a) - state.days.indexOf(b));
        }
        autoSave(); renderDayToggles(); renderGrid();
      });
      row.appendChild(el);
    });
  }

  function renderGrid() {
    const g = document.getElementById('tt-grid');
    const days = activeDaysOrdered();
    const slots = getSlots();
    g.style.gridTemplateColumns = `58px repeat(${days.length}, minmax(96px,1fr))`;
    g.innerHTML = '';
    const corner = document.createElement('div');
    corner.className = 'tt-head-cell corner';
    g.appendChild(corner);
    days.forEach(d => {
      const h = document.createElement('div');
      h.className = 'tt-head-cell'; h.textContent = d;
      g.appendChild(h);
    });
    slots.forEach(slot => {
      const tl = document.createElement('div');
      tl.className = 'time-label'; tl.textContent = slot;
      g.appendChild(tl);
      days.forEach(day => {
        const cell = document.createElement('div');
        cell.className = 'tt-cell';
        const k = day + '|' + slot;
        if (state.grid[k]) {
          const s = state.grid[k];
          const block = document.createElement('div');
          block.className = 'cell-block';
          block.style.background = s.color + '28';
          block.style.border = '1px solid ' + s.color + '55';
          block.innerHTML = `<span class="cell-block-name" style="color:${s.color}">${s.name}</span><span class="cell-del">×</span>`;
          block.querySelector('.cell-del').addEventListener('click', e => {
            e.stopPropagation(); delete state.grid[k]; autoSave(); renderGrid();
          });
          cell.appendChild(block);
        }
        cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
        cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
        cell.addEventListener('drop', e => {
          e.preventDefault(); cell.classList.remove('drag-over');
          if (dragSubject) { state.grid[k] = {...dragSubject}; dragSubject = null; autoSave(); renderGrid(); }
        });
        g.appendChild(cell);
      });
    });
  }

  function renderPresets() {
    const list = document.getElementById('preset-list');
    list.innerHTML = '';
    if (!presets.length) {
      list.innerHTML = '<div style="font-size:10px;color:var(--ink-dim);">no saves yet</div>';
      return;
    }
    presets.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'preset-item';
      const btn = document.createElement('button');
      btn.className = 'tt-btn';
      btn.style.cssText = 'text-align:left;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      btn.textContent = p.name;
      btn.addEventListener('click', () => {
        state = JSON.parse(JSON.stringify(p));
        colorIdx = state.subjects.length;
        syncInputs(); autoSave();
        renderSubjects(); renderDayToggles(); renderGrid();
        setSaveStatus('loaded: ' + p.name, 'ok', true);
      });
      const del = document.createElement('span');
      del.className = 'preset-del'; del.textContent = '×';
      del.addEventListener('click', () => {
        presets.splice(i, 1);
        lsSet(LS_PRESETS, presets);
        renderPresets();
      });
      row.appendChild(btn); row.appendChild(del);
      list.appendChild(row);
    });
  }

  function syncInputs() {
    document.getElementById('period-start').value = state.periodStart;
    document.getElementById('period-count').value = state.periodCount;
    document.getElementById('period-dur').value = state.periodDur;
  }

  document.getElementById('btn-add-subject').addEventListener('click', () => {
    const inp = document.getElementById('new-subject');
    const name = inp.value.trim().toLowerCase();
    if (!name || state.subjects.find(s => s.name === name)) { inp.value = ''; return; }
    state.subjects.push({ name, color: COLORS[colorIdx % COLORS.length] });
    colorIdx++; inp.value = ''; autoSave(); renderSubjects();
  });
  document.getElementById('new-subject').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-add-subject').click(); });

  document.getElementById('btn-add-day').addEventListener('click', () => {
    const inp = document.getElementById('new-day');
    const name = inp.value.trim().toLowerCase();
    if (!name || state.days.includes(name)) { inp.value = ''; return; }
    state.days.push(name); state.activeDays.push(name);
    inp.value = ''; autoSave(); renderDayToggles(); renderGrid();
  });
  document.getElementById('new-day').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-add-day').click(); });

  document.getElementById('btn-apply-periods').addEventListener('click', () => {
    state.periodStart = parseInt(document.getElementById('period-start').value) || 8;
    state.periodCount = Math.min(16, Math.max(1, parseInt(document.getElementById('period-count').value) || 9));
    state.periodDur = parseInt(document.getElementById('period-dur').value) || 60;
    state.grid = {}; autoSave(); renderGrid();
  });

  document.getElementById('btn-clear').addEventListener('click', () => { state.grid = {}; autoSave(); renderGrid(); });

  document.getElementById('btn-save-preset').addEventListener('click', () => {
    const name = document.getElementById('preset-name').value.trim();
    if (!name) return;
    const snap = JSON.parse(JSON.stringify(state));
    snap.name = name;
    const existing = presets.findIndex(p => p.name === name);
    if (existing >= 0) presets[existing] = snap; else presets.push(snap);
    state.name = name;
    lsSet(LS_PRESETS, presets);
    autoSave();
    document.getElementById('preset-name').value = '';
    setSaveStatus('saved ✓', 'ok', true);
    renderPresets();
  });
  document.getElementById('preset-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-save-preset').click(); });

  document.getElementById('btn-export').addEventListener('click', () => {
    const days = activeDaysOrdered();
    const slots = getSlots();
    const col = 14;
    let out = ' '.repeat(8) + days.map(d => d.padEnd(col)).join('') + '\n';
    out += '─'.repeat(8 + col * days.length) + '\n';
    slots.forEach(slot => {
      let row = slot.padEnd(8);
      days.forEach(day => {
        const k = day + '|' + slot;
        row += (state.grid[k] ? state.grid[k].name : '·').padEnd(col);
      });
      out += row + '\n';
    });
    document.getElementById('export-content').textContent = out;
    document.getElementById('export-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  });

  document.getElementById('btn-close-export').addEventListener('click', () => {
    document.getElementById('export-modal').classList.remove('open');
    document.body.style.overflow = '';
  });
  document.getElementById('export-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('export-modal')) {
      document.getElementById('export-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('export-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('export-content').textContent).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy', 1500);
    });
  });

  syncInputs();
  renderSubjects();
  renderDayToggles();
  renderGrid();
  renderPresets();
  document.getElementById('nav-version').textContent = state.name;
</script>
</body>
</html>
